# ==========================================
# ТЕМА В СТИЛЕ DIPLODOC (ЗЕЛЁНЫЕ ОТТЕНКИ)
# ==========================================

# --- ОСНОВНОЙ АКЦЕНТНЫЙ ЦВЕТ ---
# От этого цвета автоматически рассчитываются:
#   base-selection, link, link-hover, tab-active, tab-text, tab-text-hover, quote
# Можно переопределить любое из этих значений вручную ниже
base-brand: rgb(84,186,126)

# ==========================================
# ОБЩИЕ НАСТРОЙКИ (для светлой и тёмной тем)
# ==========================================

# --- ТЕКСТ ---
# Основной текст страниц, текст в таблицах
text-primary: rgb(26,26,46)
# Второстепенный текст: пункты оглавления, значки настроек, языка и т.д.
text-secondary: rgb(107,114,128)

# --- ФОН ---
# Фон всей страницы
base-background: rgb(255,255,255)
# Выбранная страница в левом меню (сайдбаре), выбранный пункт в дропдауне
base-selection: rgb(232,245,238)
# Цвет при наведении на элементы интерфейса (пункты меню, кнопки)
base-simple-hover: rgb(245,247,250)

# --- ССЫЛКИ ---
# Цвет всех ссылок на странице
link: rgb(84,186,126)
# Цвет ссылок при наведении курсора
link-hover: rgb(61,160,104)

# --- ВКЛАДКИ (ТАБЫ) ---
# Цвет активной (выбранной) вкладки
tab-active: rgb(84,186,126)
# Цвет текста на вкладках
tab-text: rgb(26,26,46)
# Цвет текста на вкладках при наведении
tab-text-hover: rgb(61,160,104)

# --- ЦИТАТЫ ---
# Цвет фона для цитат (блоков quote)
quote: rgb(232,245,238)

# --- ПОДСКАЗКИ И ТЕРМИНЫ ---
# Фон всплывающих подсказок при наведении на термин
term-dfn-background: rgb(245,247,250)

# --- ЛИНИИ И РАЗДЕЛИТЕЛИ ---
# Цвет линий между элементами страницы, внешние рамки таблиц,
# общая линия табов, общая линия оглавления статьи
line-generic: rgb(224,228,232)

# --- ОФОРМЛЕНИЕ КОДА ---
# Цвет текста в блоке кода (pre)
code: rgb(26,26,46)
# Фон блока кода
code-background: rgb(245,247,250)
# Цвет текста во встроенном фрагменте кода (`code`)
inline-code: rgb(84,186,126)
# Фон встроенного фрагмента кода
inline-code-background: rgb(232,245,238)

# --- ТАБЛИЦЫ ---
# Цвет текста в таблице
table: rgb(26,26,46)
# Фон таблицы
table-background: rgb(255,255,255)
# Цвет фона чётных (выделяющихся) рядов таблицы
table-row-background: rgb(245,247,250)
# Рамка таблицы
table-border: rgb(224,228,232)

# --- ЗАМЕТКИ (NOTE) ---
# Фон заметки "Примечание" (info) и заметки со своим заголовком
note-info-background: rgb(232,245,238)
# Фон заметки "Совет" (tip)
note-tip-background: rgb(232,245,238)
# Фон заметки "Важно" (warning) — жёлтый оттенок
note-warning-background: rgb(255,243,205)
# Фон заметки "Внимание" (important) — красный оттенок
note-important-background: rgb(248,215,218)

# --- МИНИ-ОГЛАВЛЕНИЕ СТАТЬИ (справа) ---
# Цвет общей линии оглавления статьи
mini-toc-border: rgb(224,228,232)
# Цвет текста пунктов оглавления статьи
mini-toc: rgb(107,114,128)
# Цвет текста пунктов оглавления статьи при наведении
mini-toc-hover: rgb(84,186,126)
# Цвет текста активного пункта оглавления статьи
mini-toc-active: rgb(84,186,126)
# Цвет линии активного пункта оглавления статьи
mini-toc-active-border: rgb(84,186,126)

# ==========================================
# ПЕРЕОПРЕДЕЛЕНИЯ ДЛЯ СВЕТЛОЙ ТЕМЫ
# Параметры здесь имеют приоритет над общими
# ==========================================
light:
  # Ссылки — основной зелёный
  link: rgb(84,186,126)
  # Ссылки при наведении — тёмно-зелёный
  link-hover: rgb(61,160,104)
  # Фон страницы — белый
  base-background: rgb(255,255,255)
  # Выбранный пункт в сайдбаре — светло-зелёный
  base-selection: rgb(232,245,238)
  # Фон цитат — светло-зелёный
  quote: rgb(232,245,238)
  # Чётные ряды таблиц — светло-серый
  table-row-background: rgb(245,247,250)
  # Фон блоков кода — светло-серый
  code-background: rgb(245,247,250)
  # Встроенный код — зелёный текст
  inline-code: rgb(84,186,126)
  # Фон встроенного кода — светло-зелёный
  inline-code-background: rgb(232,245,238)

# ==========================================
# ПЕРЕОПРЕДЕЛЕНИЯ ДЛЯ ТЁМНОЙ ТЕМЫ
# Параметры здесь имеют приоритет над общими
# ==========================================
dark:
  # Фон страницы — тёмно-серый
  base-background: rgb(30,30,30)
  # Основной текст — светло-серый
  text-primary: rgb(224,224,224)
  # Второстепенный текст — серый
  text-secondary: rgb(160,160,160)
  # Линии и разделители — тёмные
  line-generic: rgb(64,64,64)

  # Ссылки — мягкий зелёный (хорошо читается на тёмном фоне)
  link: rgb(107,207,148)
  # Ссылки при наведении — более светлый зелёный
  link-hover: rgb(142,219,172)

  # Активная вкладка — мягкий зелёный
  tab-active: rgb(107,207,148)
  # Текст на вкладках — светло-серый
  tab-text: rgb(224,224,224)
  # Текст на вкладках при наведении — светлый зелёный
  tab-text-hover: rgb(142,219,172)

  # Выбранный пункт в сайдбаре — полупрозрачный зелёный
  base-selection: rgba(84,186,126,0.15)
  # Наведение на элементы — чуть светлее фона
  base-simple-hover: rgb(42,42,42)

  # Фон цитат — полупрозрачный зелёный
  quote: rgba(84,186,126,0.1)

  # Фон подсказок — тёмный
  term-dfn-background: rgb(42,42,42)

  # Текст в блоках кода — светло-серый
  code: rgb(224,224,224)
  # Фон блоков кода — тёмный
  code-background: rgb(42,42,42)
  # Встроенный код — мягкий зелёный текст
  inline-code: rgb(107,207,148)
  # Фон встроенного кода — полупрозрачный зелёный
  inline-code-background: rgba(84,186,126,0.15)

  # Текст в таблицах — светло-серый
  table: rgb(224,224,224)
  # Фон таблиц — тёмный
  table-background: rgb(30,30,30)
  # Чётные ряды таблиц — чуть светлее фона
  table-row-background: rgb(42,42,42)
  # Рамки таблиц — тёмные
  table-border: rgb(64,64,64)

  # Заметки в тёмной теме — полупрозрачные фоны
  note-info-background: rgba(84,186,126,0.1)
  note-tip-background: rgba(84,186,126,0.1)
  note-warning-background: rgba(255,193,7,0.1)
  note-important-background: rgba(220,53,69,0.1)

  # Мини-оглавление в тёмной теме
  mini-toc-border: rgb(64,64,64)
  mini-toc: rgb(160,160,160)
  mini-toc-hover: rgb(107,207,148)
  mini-toc-active: rgb(107,207,148)
  mini-toc-active-border: rgb(107,207,148)