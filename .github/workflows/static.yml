name: Deploy Diplodoc to GitHub Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      # Шаг 1: Клонирование репозитория
      - name: Checkout
        uses: actions/checkout@v4

      # Шаг 2: Настройка GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Шаг 3: Установка Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      # Шаг 4: Установка зависимостей (ваш package.json)
      - name: Install dependencies
        run: npm ci

      # Шаг 5: Сборка документации через yfm CLI
      - name: Build docs
        run: npx yfm build -i ./docs -o ./docs-html

      # Шаг 6: Загрузка собранных HTML-файлов
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs-html'

      # Шаг 7: Публикация на GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4