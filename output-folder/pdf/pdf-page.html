%BB%D0%B5%D1%87%D0%B5%D0%BD%D0%B8%D0%B5%D0%BC%20%D0%B0%D0%B4%D0%BC%D0%B8%D0%BD%D0%B8%D1%81%D1%82%D1%80%D0%B0%D1%82%D0%BE%D1%80%D0%B0%20%D1%81%D0%BE%20%D1%81%D1%82%D0%BE%D1%80%D0%BE%D0%BD%D1%8B%20%D0%BF%D0%BE%D0%BB%D1%8C%D0%B7%D0%BE%D0%B2%D0%B0%D1%82%D0%B5%D0%BB%D1%8F.%3C%2Fp%3E%5Cn%22%7D%2C%22media%22%3A%7B%22image%22%3A%7B%22src%22%3A%22https%3A%2F%2Fstorage.yandexcloud.net%2Fdiplodoc-www-assets%2Fpages%2Findex-diplodoc%2Fddos-index-item-01-03.png%22%2C%22disableCompress%22%3Atrue%7D%7D%2C%22fullScreen%22%3Atrue%2C%22border%22%3Atrue%7D%5D%7D%5D%7D\" data-rendered=\"false\"&gt;&lt;/div&gt;&lt;hr&gt;\n&lt;/div&gt;&lt;div class=\"pdf-page-wrapper\" data-page-break=\"true\"&gt;&lt;h2 data-original-article=\"pages/what-is-deepseek.html\"&gt;Что такое DeepSeek и почему о нем все говорят?&lt;a class=\"yfm-anchor\" aria-hidden=\"true\" href=\"#pages_what-is-deepseek\" id=\"pages_what-is-deepseek\"&gt;&lt;/a&gt;&lt;/h2&gt;&lt;p&gt;&lt;strong&gt;DeepSeek&lt;/strong&gt; — это мощная языковая модель и чат-бот от одноименного китайского стартапа, которая наделала много шума в начале 2025 года. По своим возможностям она не уступает ChatGPT, но при этом имеет ряд ключевых отличий.&lt;/p&gt;\n&lt;h3 id=\"pages_what-is-deepseek_klyuchevye-osobennosti\"&gt;&lt;a href=\"#pages_what-is-deepseek_klyuchevye-osobennosti\" class=\"yfm-anchor yfm-clipboard-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Ключевые особенности&lt;/span&gt;&lt;/a&gt;Ключевые особенности&lt;/h3&gt;\n&lt;ol&gt;\n&lt;li&gt;&lt;strong&gt;Открытый исходный код:&lt;/strong&gt; В отличие от многих конкурентов, код DeepSeek открыт. Это значит, что разработчики по всему миру могут изучать, дорабатывать и использовать модель для своих проектов.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Эффективность:&lt;/strong&gt; На обучение модели DeepSeek V3 было потрачено около 5,5 миллионов долларов, что в разы дешевле, чем обучение GPT-4 от OpenAI. Она использует архитектуру Mixture of Experts, активируя лишь небольшую часть своих 671 млрд параметров для каждого запроса.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Бесплатный доступ:&lt;/strong&gt; У веб-версии и мобильного приложения DeepSeek нет планов на введение платной подписки. Это делает ее доступной для всех, в том числе и для пользователей из России (регистрация через Google).&lt;/li&gt;\n&lt;/ol&gt;\n&lt;div class=\"yfm-note yfm-accent-info\" note-type=\"info\"&gt;&lt;p class=\"yfm-note-title\"&gt;Примечание&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;DeepSeek особенно хорош в решении логических и математических задач, написании кода и анализе больших объемов текста.&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h3 id=\"pages_what-is-deepseek_sravnenie-s-chatgpt\"&gt;&lt;a href=\"#pages_what-is-deepseek_sravnenie-s-chatgpt\" class=\"yfm-anchor yfm-clipboard-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Сравнение с ChatGPT&lt;/span&gt;&lt;/a&gt;Сравнение с ChatGPT&lt;/h3&gt;\n&lt;table&gt;\n&lt;thead&gt;\n&lt;tr&gt;\n&lt;th style=\"text-align:left\"&gt;Критерий&lt;/th&gt;\n&lt;th style=\"text-align:left\"&gt;DeepSeek&lt;/th&gt;\n&lt;th style=\"text-align:left\"&gt;ChatGPT&lt;/th&gt;\n&lt;/tr&gt;\n&lt;/thead&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td style=\"text-align:left\"&gt;&lt;strong&gt;Исходный код&lt;/strong&gt;&lt;/td&gt;\n&lt;td style=\"text-align:left\"&gt;Открытый&lt;/td&gt;\n&lt;td style=\"text-align:left\"&gt;Закрытый&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td style=\"text-align:left\"&gt;&lt;strong&gt;Стоимость&lt;/strong&gt;&lt;/td&gt;\n&lt;td style=\"text-align:left\"&gt;Бесплатно&lt;/td&gt;\n&lt;td style=\"text-align:left\"&gt;Есть бесплатная и платная версии&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td style=\"text-align:left\"&gt;&lt;strong&gt;Режим \"Размышления\"&lt;/strong&gt;&lt;/td&gt;\n&lt;td style=\"text-align:left\"&gt;DeepThink (R1) - показывает цепочку рассуждений&lt;/td&gt;\n&lt;td style=\"text-align:left\"&gt;GPT-4o - дает финальный ответ&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td style=\"text-align:left\"&gt;&lt;strong&gt;Сильные стороны&lt;/strong&gt;&lt;/td&gt;\n&lt;td style=\"text-align:left\"&gt;Логика, математика, программирование&lt;/td&gt;\n&lt;td style=\"text-align:left\"&gt;Креативность, работа с изображениями&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&lt;/div&gt;&lt;div class=\"pdf-page-wrapper\" data-page-break=\"true\"&gt;&lt;h2 data-original-article=\"pages/how-to-learn.html\"&gt;Как учиться с DeepSeek: 4 эффективные стратегии&lt;a class=\"yfm-anchor\" aria-hidden=\"true\" href=\"#pages_how-to-learn\" id=\"pages_how-to-learn\"&gt;&lt;/a&gt;&lt;/h2&gt;&lt;p&gt;DeepSeek — это не просто чат-бот, а мощный инструмент для самообразования. Вот как его можно использовать с максимальной пользой.&lt;/p&gt;\n&lt;h3 id=\"pages_how-to-learn_1-princip-fejnmana-s-ii\"&gt;&lt;a href=\"#pages_how-to-learn_1-princip-fejnmana-s-ii\" class=\"yfm-anchor yfm-clipboard-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;1. Принцип Фейнмана с ИИ&lt;/span&gt;&lt;/a&gt;1. Принцип Фейнмана с ИИ&lt;/h3&gt;\n&lt;p&gt;Объясните сложную тему своими словами и попросите DeepSeek проверить вас.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Пример промпта:&lt;/strong&gt;&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Представь, что я студент, который только начал изучать квантовую физику. Объясни мне, что такое \"запутанность\", и задай 3 вопроса, чтобы проверить мое понимание.&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h3 id=\"pages_how-to-learn_2-sozdanie-uchebnogo-plana\"&gt;&lt;a href=\"#pages_how-to-learn_2-sozdanie-uchebnogo-plana\" class=\"yfm-anchor yfm-clipboard-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;2. Создание учебного плана&lt;/span&gt;&lt;/a&gt;2. Создание учебного плана&lt;/h3&gt;\n&lt;p&gt;Нейросеть отлично справляется с планированием. Попросите ее составить для вас пошаговый план обучения с нуля [citation:2].&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Пример промпта:&lt;/strong&gt;&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Я хочу выучить Python для анализа данных с нуля. У меня есть 5 часов в неделю. Составь план обучения на 2 месяца с указанием тем и проектов для закрепления.&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h3 id=\"pages_how-to-learn_3-generaciya-interaktivnyh-testov\"&gt;&lt;a href=\"#pages_how-to-learn_3-generaciya-interaktivnyh-testov\" class=\"yfm-anchor yfm-clipboard-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;3. Генерация интерактивных тестов&lt;/span&gt;&lt;/a&gt;3. Генерация интерактивных тестов&lt;/h3&gt;\n&lt;p&gt;Проверять свои знания так же важно, как и получать их. DeepSeek может создать тест по любой теме.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Пример промпта:&lt;/strong&gt;&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Составь тест из 10 вопросов с множественным выбором по истории Древнего Рима. После каждого вопроса давай обратную связь, правильный ли был дан ответ.&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h3 id=\"pages_how-to-learn_4-rezhim-glubokogo-myshleniya-deepthink\"&gt;&lt;a href=\"#pages_how-to-learn_4-rezhim-glubokogo-myshleniya-deepthink\" class=\"yfm-anchor yfm-clipboard-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;4. Режим \"Глубокого мышления\" (DeepThink)&lt;/span&gt;&lt;/a&gt;4. Режим \"Глубокого мышления\" (DeepThink)&lt;/h3&gt;\n&lt;p&gt;Главная \"киллер-фича\" DeepSeek — это способность показывать ход своих рассуждений. Это бесценно для обучения, так как позволяет понять не только \"что\", но и \"почему\" [citation:10].&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Пример использования:&lt;/strong&gt;&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Вместо того чтобы просто попросить решить задачу, попросите нейросеть описать ход решения шаг за шагом, а затем сравните его со своим.&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;/div&gt;&lt;div class=\"pdf-page-wrapper\" data-page-break=\"true\"&gt;&lt;h2 data-original-article=\"pages/advanced-tips.html\"&gt;Продвинутые техники самообучения с DeepSeek&lt;a class=\"yfm-anchor\" aria-hidden=\"true\" href=\"#pages_advanced-tips\" id=\"pages_advanced-tips\"&gt;&lt;/a&gt;&lt;/h2&gt;&lt;p&gt;Для тех, кто освоил основы, есть несколько продвинутых техник, которые превратят ИИ в персонального ментора.&lt;/p&gt;\n&lt;h3 id=\"pages_advanced-tips_1-rolevye-igry-i-simulyacii\"&gt;&lt;a href=\"#pages_advanced-tips_1-rolevye-igry-i-simulyacii\" class=\"yfm-anchor yfm-clipboard-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;1. Ролевые игры и симуляции&lt;/span&gt;&lt;/a&gt;1. Ролевые игры и симуляции&lt;/h3&gt;\n&lt;p&gt;Попросите DeepSeek сыграть роль эксперта, интервьюера или даже оппонента в споре.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Промпт:&lt;/strong&gt;&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Сыграй роль технического директора. Я пришел к тебе с идеей нового мобильного приложения. Задай мне 10 критических вопросов о монетизации, технологическом стеке и привлечении пользователей.&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h3 id=\"pages_advanced-tips_2-analiz-bolshih-dokumentov\"&gt;&lt;a href=\"#pages_advanced-tips_2-analiz-bolshih-dokumentov\" class=\"yfm-anchor yfm-clipboard-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;2. Анализ больших документов&lt;/span&gt;&lt;/a&gt;2. Анализ больших документов&lt;/h3&gt;\n&lt;p&gt;Вы можете загрузить в DeepSeek файлы до 100 МБ. Используйте это для суммаризации лекций или анализа научных статей [citation:10].&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Промпт:&lt;/strong&gt;&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Прикрепите PDF-файл с научной статьей.&lt;br&gt;\nВыдели из этой статьи ключевую гипотезу, методологию исследования и 3 главных вывода. Объясни их простым языком.&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h3 id=\"pages_advanced-tips_3-avtomatizaciya-rutiny\"&gt;&lt;a href=\"#pages_advanced-tips_3-avtomatizaciya-rutiny\" class=\"yfm-anchor yfm-clipboard-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;3. Автоматизация рутины&lt;/span&gt;&lt;/a&gt;3. Автоматизация рутины&lt;/h3&gt;\n&lt;p&gt;DeepSeek может написать для вас скрипт для автоматизации скучных задач в учебе.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Промпт:&lt;/strong&gt;&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Напиши скрипт на Python, который берет мой текстовый файл с вопросами и создает из него карточки для Anki в формате CSV.&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h3 id=\"pages_advanced-tips_4-sozdanie-lichnogo-slovarya\"&gt;&lt;a href=\"#pages_advanced-tips_4-sozdanie-lichnogo-slovarya\" class=\"yfm-anchor yfm-clipboard-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;4. Создание \"личного словаря\"&lt;/span&gt;&lt;/a&gt;4. Создание \"личного словаря\"&lt;/h3&gt;\n&lt;p&gt;При изучении иностранного языка можно вести диалог и просить нейросеть автоматически выписывать новые слова с переводом и контекстом.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Промпт:&lt;/strong&gt;&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;Давай поговорим на тему \"Путешествия\" на английском. В конце диалога выпиши все новые для меня слова с переводом и примером использования.&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;/div&gt;","headings":[],"meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.39.2"},{"name":"description","content":"Ваш путеводитель по использованию DeepSeek для эффективного самообучения."},{"name":"description","content":"Узнайте о китайском конкуренте ChatGPT и его впечатляющих возможностях."}],"style":["_bundle/page-constructor-extension.css"],"script":["_bundle/page-constructor-extension.js"]},"title":"DeepSeek Самоучитель"},"router":{"pathname":"pdf-page","depth":1,"base":"./"},"lang":"ru","langs":["ru"],"viewerInterface":{"search":true,"darkMode":true,"toc":true,"feedback":true},"search":{"provider":"local","tolerance":2,"confidense":"phrased","enabled":true,"api":"_search\\api.js","link":"_search\\ru\\index.html"}}
