# Заголовок сайта (отображается в левом меню)
title: "DeepSeek Самоучитель"
# Главная страница — снова index.md
href: index.md

# Настройка верхней навигационной панели
navigation:
  logo:
    url: ./index.html
    text: DS Guide
    target: _self
  header:
    leftItems:
      - text: О проекте
        type: link
        url: ./index.html
        target: _self
      - text: DeepSeek AI
        type: link
        url: https://www.deepseek.com/
        target: _blank
    rightItems:
      # Блок controls управляет иконками в правом верхнем углу
      - type: controls
        search: true  # Иконка поиска
        darkMode: true  # Переключатель светлой/тёмной темы

# Структура левого сайдбара
items:
  - name: Введение
    expanded: true
    items:
      - name: Обзор
        # Пункт меню "Обзор" снова ведет на index.md
        href: ./index.md
      - name: Что такое DeepSeek
        href: ./pages/what-is-deepseek.md
  - name: Самообучение с ИИ
    items:
      - name: Как учиться с DeepSeek
        href: ./pages/how-to-learn.md
      - name: Продвинутые техники
        href: ./pages/advanced-tips.md
  - name: Полезные ссылки
    items:
      - name: Официальный сайт
        href: https://chat.deepseek.com/
        target: _blank

# === НАСТРОЙКИ PDF (добавьте этот блок в конец файла) ===
# Определяем титульные и закрывающие страницы для PDF-версии
pdf:
  startPages:
    # Путь к файлу, который станет титульной страницей PDF
    - ./_includes/pdf-title.md
  # endPages: # Можно добавить и закрывающие страницы
  #   - ./_includes/pdf-end.md